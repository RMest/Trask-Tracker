<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Canvas</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main>
    <h1>Riley's Simple Calculator</h1>
    <p>Enter two numbers and click the button to perform the calculation.</p>
    <p id="result">Result: 0</p>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button id="addBtn" type="button">Add</button>
    <button id="subtractBtn" type="button">Subtract</button>
    <button id="multiplyBtn" type="button">Multiply</button>
    <button id="divideBtn" type="button">Divide</button>
</main>
<script src="/app.js"></script>
</body>
</html>
